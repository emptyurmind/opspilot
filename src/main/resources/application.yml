spring:
  application:
    name: opspilot
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
